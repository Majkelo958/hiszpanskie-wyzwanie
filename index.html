<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiszpańskie Wyzwanie 30 Dni</title>
    <style>
        :root {
            --primary: #d97706;
            --primary-hover: #b45309;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --done: #22c55e;
            --frozen: #3b82f6;
            --recovered: #a855f7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1, h2 {
            text-align: center;
            color: var(--text-color);
        }

        .login-section, .dashboard {
            display: none;
        }

        .login-section.active, .dashboard.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input, button {
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }

        .day-box {
            aspect-ratio: 1;
            background: #e2e8f0;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            position: relative;
            transition: transform 0.1s, background 0.2s;
            user-select: none;
        }

        .day-box:hover {
            transform: scale(1.05);
        }

        .day-box.done { background-color: var(--done); color: white; }
        .day-box.frozen { background-color: var(--frozen); color: white; }
        .day-box.recovered { background-color: var(--recovered); color: white; }
        .day-box.missed { background-color: #ef4444; color: white; }

        .day-label {
            font-size: 11px;
            opacity: 0.9;
        }

        /* Modal do wyboru statusu */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .modal h3 {
            margin-top: 0;
            text-align: center;
        }

        .btn-done { background-color: var(--done); }
        .btn-frozen { background-color: var(--frozen); }
        .btn-recovered { background-color: var(--recovered); }
        .btn-missed { background-color: #ef4444; }
        .btn-missed:hover { background-color: #dc2626; }
        .btn-clear { background-color: #64748b; }

        .leaderboard-section {
            margin-top: 40px;
            border-top: 2px solid #f1f5f9;
            padding-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f8fafc;
        }
        
        .loader {
            text-align: center;
            font-style: italic;
            color: #64748b;
            display: none;
            margin: 10px 0;
        }
        
    </style>
</head>
<body>

    <div class="container">
        <h1>🇪🇸 Hiszpańskie Wyzwanie 30 Dni</h1>

        <!-- SEKJA LOGOWANIA -->
        <div id="loginSection" class="login-section active">
            <h2>Wpisz swoje imię, aby rozpocząć</h2>
            <div class="form-group">
                <input type="text" id="usernameInput" placeholder="Twoje imię lub nick...">
                <button onclick="handleLogin()">Wejdź do wyzwania</button>
            </div>
        </div>

        <!-- DASHBOARD UŻYTKOWNIKA -->
        <div id="dashboardSection" class="dashboard">
            <h2 id="welcomeUser"></h2>
            
            <div class="stats">
                <div>Zamrożenia: <span id="freezesCount">2</span>/2</div>
                <div>Nadrobienia: <span id="recoveriesCount">2</span>/2</div>
            </div>

            <div class="loader" id="loader">Zapisywanie danych...</div>


            <div class="grid" id="daysGrid">
                <div id="gridLoader" style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #64748b; font-weight: bold;">Ładowanie wyzwania...</div>
            </div>

            <!-- Pudełka z wyróżnieniami (Campeón i Racha) -->
            <div class="awards-container" style="display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap;">
                <div class="award-card" style="background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px 20px; border-radius: 8px; text-align: center; flex: 1; min-width: 200px;">
                    <div style="font-size: 24px; margin-bottom: 5px;">🏆</div>
                    <div style="font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: bold;">Campeón de la disciplina</div>
                    <div id="campeonName" style="font-size: 16px; font-weight: bold; color: #1e293b; margin-top: 5px;">Ładowanie...</div>
                </div>
                
                <div class="award-card" style="background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px 20px; border-radius: 8px; text-align: center; flex: 1; min-width: 200px;">
                    <div style="font-size: 24px; margin-bottom: 5px;">🔥</div>
                    <div style="font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: bold;">Mejor racha</div>
                    <div id="mejorRachaName" style="font-size: 16px; font-weight: bold; color: #1e293b; margin-top: 5px;">Ładowanie...</div>
                </div>
            </div>
            <button onclick="logout()" style="background-color: #64748b; width: 100%;">Zmień użytkownika</button>

            <!-- TABLICA WYNIKÓW -->
            <div class="leaderboard-section">
                <h2>🏆 Tablica Wyników</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Miejsce</th>
                            <th>Uczestnik</th>
                            <th>Dni nauki</th>
                            <th>Zamrożenia</th>
                            <th>Nadrobienia</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <!-- Generowane dynamicznie -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    
  <!-- MODAL WYBORU STATUSU -->
    <div class="modal-overlay" id="statusModal">
        <div class="modal">
            <h3 id="modalTitle">Wybierz status</h3>
            <button class="btn-done" onclick="setStatusAndSend('done')">✅ Uczyłem się</button>
            <button class="btn-missed" onclick="setStatusAndSend('missed')">❌ Nie uczyłem się</button>
            <button class="btn-frozen" onclick="setStatusAndSend('frozen')">❄️ Zamrożone</button>
            <button class="btn-recovered" onclick="setStatusAndSend('recovered')">🔥 Nadrobione</button>
            <button class="btn-clear" onclick="setStatusAndSend('none')">🗑️ Usuń status</button>
            <button onclick="closeModal()" style="background: #cbd5e1; color: #1e293b; margin-top: 10px;">Anuluj</button>
        </div>
    </div>

    <script>
        // TUTAJ WSTAW SWÓJ URL DO WEB APP Z GOOGLE APPS SCRIPT
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcrvyPhnxObGuhSAyjipmnpSGTO_vjW4z_xr5MxTq9QJiWIt-XXOsIbD7h9ErXcVU8/exec";

        let currentUser = localStorage.getItem('hs_user') || '';
        let userData = {};
        let activeDay = null;

        window.onload = function() {
            if (currentUser) {
                document.getElementById('usernameInput').value = currentUser;
                loadUserData();
            }
        };

        function handleLogin() {
            const input = document.getElementById('usernameInput').value.trim();
            if (!input) {
                alert('Proszę wpisać imię!');
                return;
            }
            currentUser = input;
            localStorage.setItem('hs_user', currentUser);
            loadUserData();
        }

        function logout() {
            localStorage.removeItem('hs_user');
            currentUser = '';
            document.getElementById('dashboardSection').classList.remove('active');
            document.getElementById('loginSection').classList.add('active');
        }

       function renderGrid() {
            const grid = document.getElementById('daysGrid');
            grid.innerHTML = ''; // To automatycznie usuwa loader, gdy dane są gotowe

            for (let i = 1; i <= 30; i++) {
                const status = userData[i] || '';
                const box = document.createElement('div');
                box.className = `day-box ${status}`;
                box.innerHTML = `<span>${i}</span><span class="day-label">${getStatusLabel(status)}</span>`;
                box.onclick = () => openModal(i);
                grid.appendChild(box);
            }
        }

        function getStatusLabel(status) {
            if (status === 'done') return 'Zaliczone';
            if (status === 'missed') return 'Niezaliczone';
            if (status === 'frozen') return 'Zamrożone';
            if (status === 'recovered') return 'Nadrobione';
            return '';
        }

        function openModal(day) {
            activeDay = day;
            document.getElementById('modalTitle').innerText = `Dzień ${day}`;
            document.getElementById('statusModal').style.display = 'flex';
        }

        function closeModal() {
            activeDay = null;
            document.getElementById('statusModal').style.display = 'none';
        }

        function setStatusAndSend(status) {
            const dayToUpdate = activeDay;
            closeModal();
            
            if (!dayToUpdate) {
                alert('Błąd: Nie wybrano dnia!');
                return;
            }

            // 1. Walidacja limitów po stronie klienta (zanim cokolwiek zmienimy)
            if (status === 'frozen') {
                let currentFreezes = 0;
                for (let d in userData) {
                    if (userData[d] === 'frozen' && parseInt(d) !== parseInt(dayToUpdate)) {
                        currentFreezes++;
                    }
                }
                if (currentFreezes >= 2) {
                    alert('Przekroczono limit 2 zamrożeń!');
                    return;
                }
            }

            if (status === 'recovered') {
                let currentRecoveries = 0;
                for (let d in userData) {
                    if (userData[d] === 'recovered' && parseInt(d) !== parseInt(dayToUpdate)) {
                        currentRecoveries++;
                    }
                }
                if (currentRecoveries >= 2) {
                    alert('Przekroczono limit 2 nadrobień!');
                    return;
                }
            }

            // 2. Jeśli limity są OK, robimy optymistyczną zmianę na ekranie
            const previousStatus = userData[dayToUpdate];
            if (status === 'none') {
                delete userData[dayToUpdate];
            } else {
                userData[dayToUpdate] = status;
            }
            renderGrid();

            // 3. Wysłanie danych do Google Sheets w tle
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'updateDay',
                    user: currentUser,
                    day: dayToUpdate,
                    status: status
                })
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    document.getElementById('freezesCount').innerText = result.freezesCount;
                    document.getElementById('recoveriesCount').innerText = result.recoveriesCount;
                    loadLeaderboard();
                } else {
                    // Awaryjne cofnięcie, gdyby serwer zwrócił inny błąd
                    if (previousStatus) {
                        userData[dayToUpdate] = previousStatus;
                    } else {
                        delete userData[dayToUpdate];
                    }
                    renderGrid();
                    alert('Błąd serwera: ' + result.message);
                }
            })
            .catch(err => {
                if (previousStatus) {
                    userData[dayToUpdate] = previousStatus;
                } else {
                    delete userData[dayToUpdate];
                }
                renderGrid();
                alert('Błąd połączenia z serwerem: ' + err);
            });
        }

        async function loadUserData() {
            document.getElementById('loginSection').classList.remove('active');
            document.getElementById('dashboardSection').classList.add('active');
            document.getElementById('welcomeUser').innerText = `Witaj, ${currentUser}!`;

            try {
                const response = await fetch(`${SCRIPT_URL}?action=getUserData&user=${encodeURIComponent(currentUser)}`);
                const result = await response.json();
                
                if (result.success) {
                    userData = result.days || {};
                    document.getElementById('freezesCount').innerText = result.freezesCount;
                    document.getElementById('recoveriesCount').innerText = result.recoveriesCount;
                    renderGrid();
                    loadLeaderboard();
                }
            } catch (err) {
                console.error('Nie udało się pobrać danych', err);
            }
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getLeaderboard`);
                const result = await response.json();
                
                if (result.success) {
                    const tbody = document.getElementById('leaderboardBody');
                    tbody.innerHTML = '';
                    
                    result.data.forEach((row, index) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>#${index + 1}</td>
                            <td>${row.user}</td>
                            <td><b>${row.done}</b></td>
                            <td>${row.freezes}</td>
                            <td>${row.recoveries}</td>
                        `;
                        tbody.appendChild(tr);
                    });

                    // Aktualizacja wyróżnień Campeón i Mejor racha
                    updateAwards(result.data);
                }
            } catch (err) {
                console.error('Błąd tablicy wyników', err);
            }
        }

        // Funkcja obliczająca i wyświetlająca nagrody
        function updateAwards(leaderboardData) {
            if (!leaderboardData || leaderboardData.length === 0) return;

            // Campeón de la disciplina (najwięcej zaliczonych dni)
            let campeon = leaderboardData.reduce((prev, current) => (current.done > prev.done) ? current : prev);
            document.getElementById('campeonName').innerText = `${campeon.user} (${campeon.done} dni)`;

            // Mejor racha (najdłuższa seria)
            let bestRacha = leaderboardData.reduce((prev, current) => (current.streak > prev.streak) ? current : prev);
            document.getElementById('mejorRachaName').innerText = `${bestRacha.user} (${bestRacha.streak} z rzędu)`;
        }
    </script>
</body>
</html>
